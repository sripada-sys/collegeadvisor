# GradesGenie — nginx site config (Vultr VPS)
# Place at: /etc/nginx/sites-available/gradesgenie
# Enable: ln -s /etc/nginx/sites-available/gradesgenie /etc/nginx/sites-enabled/
#
# This assumes gradesgenie.com DNS points to this VPS.
# CareerPulsar stays on its own domain/port — no conflict.

server {
    listen 80;
    server_name gradesgenie.com www.gradesgenie.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name gradesgenie.com www.gradesgenie.com;

    ssl_certificate /etc/letsencrypt/live/gradesgenie.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gradesgenie.com/privkey.pem;

    client_max_body_size 50M;

    # WebSocket for voice (if re-enabled later)
    location /ws/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
