[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = .
omit =
    tests/*
    venv/*
    .venv/*
    setup.sh
    generate_guide.py
    mathtutor.py

[coverage:report]
show_missing = true
fail_under = 75
exclude_lines =
    pragma: no cover
    if __name__
    raise NotImplementedError
    def ws_voice
    _GEMINI_LIVE_URL
    _VOICE_SYSTEM_PROMPT
